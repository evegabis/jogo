<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Super Dino Game V2</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  text-align: center;
}

canvas {
  display: block;
  margin: auto;
  border: 2px solid black;
}

#menu {
  position: absolute;
  width: 100%;
  top: 20px;
  color: white;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="menu">
  <h2>Escolha seu personagem</h2>
  <button onclick="startGame(0)">Personagem 1</button>
  <button onclick="startGame(1)">Personagem 2</button>
  <button onclick="startGame(2)">Personagem 3</button>
</div>

<div id="hud"></div>
<canvas id="game" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🧑 personagens (SEUS LINKS)
let players = [
  "https://image.pngaaa.com/594/2029594-middle.png",
  "https://e7.pngegg.com/pngimages/45/416/png-clipart-crying-cat-meme-memes-mixed-memes.png",
  "https://png.pngtree.com/png-vector/20250416/ourmid/pngtree-muscle-dog-tuff-meme-sticker-vector-cute-illustration-png-image_15995130.png"
];

let playerImg = new Image();

let player = {
  x: 50,
  y: 220,
  w: 50,
  h: 50,
  vy: 0,
  jumping: false
};

let gravity = 1;
let speed = 6;
let score = 0;
let obstacles = [];
let gameStarted = false;
let gameOver = false;

// 🏆 recorde salvo
let bestScore = localStorage.getItem("bestScore") || 0;

// 🌅 fundos
let bg1 = "https://png.pngtree.com/background/20211217/original/pngtree-desert-sunset-dusk-abstract-cartoon-nature-background-picture-image_1596606.jpg";
let bg2 = "https://png.pngtree.com/thumb_back/fw800/background/20260122/pngtree-desert-landscape-at-night-with-full-moon-and-sand-dunes-image_21167770.webp";
let bg = bg1;

// 🧱 obstáculos (SEUS LINKS)
let obstaclesImg = [
  "https://png.pngtree.com/element_our/20190528/ourmid/pngtree-summer-whole-watermelon-png-image_1184558.jpg",
  "https://img.magnific.com/psd-premium/png-realista-de-banana-em-fundo-branco_1278073-1635.jpg?semt=ais_hybrid&w=740&q=80"
];

// ⌨️ pulo
document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && !player.jumping) {
    player.vy = -15;
    player.jumping = true;
  }
});

// criar obstáculo
function createObstacle() {
  obstacles.push({
    x: 800,
    y: 220,
    w: 50,
    h: 50,
    type: Math.floor(Math.random() * obstaclesImg.length)
  });
}

setInterval(() => {
  if (gameStarted && !gameOver) createObstacle();
}, 1300);

// iniciar jogo
function startGame(choice) {
  playerImg.src = players[choice];

  document.getElementById("menu").style.display = "none";
  gameStarted = true;

  loop();
}

// update
function update() {
  if (gameOver) return;

  speed += 0.002;

  // player
  player.vy += gravity;
  player.y += player.vy;

  if (player.y >= 220) {
    player.y = 220;
    player.jumping = false;
  }

  // obstáculos
  obstacles.forEach((obs, i) => {
    obs.x -= speed;

    // colisão
    if (
      player.x < obs.x + obs.w &&
      player.x + player.w > obs.x &&
      player.y < obs.y + obs.h &&
      player.y + player.h > obs.y
    ) {
      gameOver = true;

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("bestScore", bestScore);
      }

      alert("💀 Game Over! Score: " + score);
      location.reload();
    }

    if (obs.x + obs.w < 0) {
      obstacles.splice(i, 1);
      score++;
    }
  });

  bg = score % 2 === 0 ? bg1 : bg2;

  document.getElementById("hud").innerHTML =
    "Score: " + score + " | Best: " + bestScore;
}

// draw
function draw() {
  let img = new Image();
  img.src = bg;
  ctx.drawImage(img, 0, 0, 800, 300);

  ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

  obstacles.forEach(o => {
    let obsImg = new Image();
    obsImg.src = obstaclesImg[o.type];
    ctx.drawImage(obsImg, o.x, o.y, o.w, o.h);
  });
}

// loop
function loop() {
  if (!gameStarted) return;

  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
