<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dino Game V8</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  overflow: hidden;
}

canvas {
  display: block;
  margin: auto;
  background: #87CEEB;
  border: 2px solid black;
}

#menu, #shop {
  position: absolute;
  width: 100%;
  top: 20px;
  color: white;
  text-align: center;
}

button {
  padding: 10px;
  margin: 5px;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
}
</style>
</head>

<body>

<div id="menu">
  <h2>Dino Game V8</h2>
  <input id="name" placeholder="Seu nome">
  <br>
  <button onclick="startGame()">Jogar</button>
  <button onclick="openShop()">Loja</button>
</div>

<div id="shop" style="display:none;">
  <h3>Loja</h3>
  <button onclick="buy(1, 10)">Cat (10 coins)</button>
  <button onclick="buy(2, 20)">Dog (20 coins)</button>
  <br>
  <button onclick="closeShop()">Voltar</button>
</div>

<div id="hud"></div>

<canvas id="game" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🧑 skins
let skins = [
  "https://image.pngaaa.com/594/2029594-middle.png",
  "https://e7.pngegg.com/pngimages/45/416/png-clipart-crying-cat-meme-memes-mixed-memes.png",
  "https://png.pngtree.com/png-vector/20250416/ourmid/pngtree-muscle-dog-tuff-meme-sticker-vector-cute-illustration-png-image_15995130.png"
];

let unlocked = [true, false, false];
let skin = 0;

// 🧱 obstáculos
let obsImgs = [
  "https://png.pngtree.com/element_our/20190528/ourmid/pngtree-summer-whole-watermelon-png-image_1184558.jpg",
  "https://img.magnific.com/psd-premium/png-realista-de-banana-em-fundo-branco_1278073-1635.jpg"
];

// 🧑 player
let playerImg = new Image();
let player = {
  x: 50,
  y: 200,
  w: 70,
  h: 70,
  vy: 0,
  jumping: false
};

// 🧠 game
let gravity = 1;
let speed = 6;
let score = 0;
let coins = 0;
let game = false;

let obstacles = [];

// 💾 recorde
let best = Number(localStorage.getItem("best") || 0);

// ⌨️ pulo
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") jump();
});

function jump() {
  if (!player.jumping && game) {
    player.vy = -15;
    player.jumping = true;
  }
}

// 🎮 start
function startGame() {
  playerImg.src = skins[skin];
  document.getElementById("menu").style.display = "none";
  game = true;
  loop();
}

// 🏪 loja
function openShop() {
  document.getElementById("shop").style.display = "block";
}
function closeShop() {
  document.getElementById("shop").style.display = "none";
}

function buy(id, price) {
  if (coins >= price && !unlocked[id]) {
    coins -= price;
    unlocked[id] = true;
    alert("Skin desbloqueada!");
  }
}

// 📦 obstáculos
function spawnObs() {
  obstacles.push({
    x: 800,
    y: 210,
    w: 60,
    h: 60,
    type: Math.floor(Math.random() * obsImgs.length)
  });
}

setInterval(() => {
  if (game) spawnObs();
}, 1300);

// 🔄 update
function update() {
  if (!game) return;

  speed += 0.001;

  player.vy += gravity;
  player.y += player.vy;

  if (player.y >= 200) {
    player.y = 200;
    player.jumping = false;
  }

  for (let i = 0; i < obstacles.length; i++) {
    let o = obstacles[i];
    o.x -= speed;

    if (
      player.x + 10 < o.x + o.w - 10 &&
      player.x + player.w - 10 > o.x + 10 &&
      player.y + 10 < o.y + o.h - 10 &&
      player.y + player.h - 10 > o.y + 10
    ) {
      endGame();
    }

    if (o.x < -100) {
      obstacles.splice(i, 1);
      score++;
      coins++;
    }
  }

  document.getElementById("hud").innerHTML =
    "Score: " + score + " | Coins: " + coins + " | Best: " + best;
}

// 💀 fim
function endGame() {
  if (score > best) {
    best = score;
    localStorage.setItem("best", best);
  }

  alert("Game Over! Score: " + score);
  location.reload();
}

// 🎨 draw
function draw() {
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0, 0, 800, 300);

  ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

  for (let o of obstacles) {
    let img = new Image();
    img.src = obsImgs[o.type];
    ctx.drawImage(img, o.x, o.y, o.w, o.h);
  }
}

// 🔁 loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
