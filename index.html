      <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Desvia do Meme V2 😂</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: #111;
}

canvas {
  display: block;
  margin: auto;
  background: #87CEEB;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 18px;
}

#btn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  padding: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="hud">Pontos: 0</div>
<button id="btn" onclick="jump()">PULAR 😂</button>

<canvas id="game" width="800" height="300"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

// 😂 frases aleatórias
let frases = [
  "Você foi humilhado por um meme 💀",
  "O meme te derrotou sem dó 😂",
  "Game Over nível vergonha alheia",
  "Você caiu no bait do meme 😭",
  "F pra você, campeão"
];

// 🧑 skins
let skins = [
  "https://image.pngaaa.com/594/2029594-middle.png",
  "https://e7.pngegg.com/pngimages/45/416/png-clipart-crying-cat-meme-memes-mixed-memes.png",
  "https://png.pngtree.com/png-vector/20250416/ourmid/pngtree-muscle-dog-tuff-meme-sticker-vector-cute-illustration-png-image_15995130.png"
];

let playerImg = new Image();

// 🧠 player
let player = {
  x: 50,
  y: 220,
  w: 60,
  h: 60,
  vy: 0,
  jump: false
};

let gravity = 1;
let score = 0;

// 😂 memes
let memes = [
  "https://i.imgflip.com/30b1gx.jpg",
  "https://i.imgflip.com/1otk96.jpg",
  "https://i.imgflip.com/1bij.jpg"
];

let enemies = [];

// 🎵 som simples (efeito básico)
let jumpSound = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");

// 🧑 escolhe skin aleatória
playerImg.src = skins[Math.floor(Math.random()*skins.length)];

// ⌨️ pulo
document.addEventListener("keydown", e=>{
  if(e.code==="Space") jump();
});

function jump(){
  if(!player.jump){
    player.vy = -15;
    player.jump = true;
    jumpSound.play();
  }
}

// 📦 spawn memes
function spawn(){
  enemies.push({
    x: 800,
    y: Math.random()*180,
    w: 60,
    h: 60,
    img: memes[Math.floor(Math.random()*memes.length)]
  });
}

setInterval(spawn, 1000);

// 🔄 update
function update(){
  player.vy += gravity;
  player.y += player.vy;

  if(player.y >= 220){
    player.y = 220;
    player.jump = false;
  }

  for(let i=0;i<enemies.length;i++){
    let e = enemies[i];
    e.x -= 6;

    if(
      player.x < e.x + e.w &&
      player.x + player.w > e.x &&
      player.y < e.y + e.h &&
      player.y + player.h > e.y
    ){
      let frase = frases[Math.floor(Math.random()*frases.length)];
      alert(frase + "\n\nPontos: " + score);
      location.reload();
    }

    if(e.x < -60){
      enemies.splice(i,1);
      score++;
      document.getElementById("hud").innerText = "Pontos: " + score;
    }
  }
}

// 🎨 draw
function draw(){
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0,0,800,300);

  // player
  ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

  // memes
  for(let e of enemies){
    let img = new Image();
    img.src = e.img;
    ctx.drawImage(img, e.x, e.y, e.w, e.h);
  }
}

// 🔁 loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
