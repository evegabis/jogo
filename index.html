<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dino V9 Online</title>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js"></script>

<style>
body { margin:0; background:black; font-family:Arial; }
canvas { display:block; margin:auto; background:#87CEEB; }
#hud { position:absolute; top:10px; left:10px; color:white; }
</style>
</head>

<body>

<div id="hud"></div>
<canvas id="game" width="800" height="300"></canvas>

<script>
// 🔥 CONFIG FIREBASE (você substitui com o seu depois)
const firebaseConfig = {
  apiKey: "SUA_API",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  databaseURL: "https://SEU_PROJETO.firebaseio.com",
  projectId: "SEU_PROJETO"
};

// init
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🧑 player
let player = { x:50, y:200, w:70, h:70, vy:0, jump:false };

let score = 0;
let speed = 6;
let game = true;

// 📦 obstáculos
let obs = [];

// ⌨️ pulo
document.addEventListener("keydown", e=>{
  if(e.code==="Space" && !player.jump){
    player.vy=-15;
    player.jump=true;
  }
});

function spawn(){
  obs.push({x:800,y:210,w:60,h:60});
}

setInterval(spawn,1300);

// 💀 salvar no ranking online
function saveScore(){
  let name = prompt("Seu nome:");
  db.ref("ranking").push({
    name:name,
    score:score
  });
}

// 🔄 update
function update(){
  if(!game) return;

  speed += 0.001;

  player.vy += 1;
  player.y += player.vy;

  if(player.y>=200){
    player.y=200;
    player.jump=false;
  }

  for(let i=0;i<obs.length;i++){
    let o=obs[i];
    o.x-=speed;

    if(
      player.x<o.x+o.w &&
      player.x+player.w>o.x &&
      player.y<o.y+o.h &&
      player.y+player.h>o.y
    ){
      game=false;
      saveScore();
      alert("Game Over: "+score);
      location.reload();
    }

    if(o.x<-100){
      obs.splice(i,1);
      score++;
    }
  }

  document.getElementById("hud").innerHTML="Score: "+score;
}

// 🎨 draw
function draw(){
  let c=document.getElementById("game").getContext("2d");

  c.fillStyle="#87CEEB";
  c.fillRect(0,0,800,300);

  c.fillStyle="blue";
  c.fillRect(player.x,player.y,player.w,player.h);

  c.fillStyle="red";
  for(let o of obs){
    c.fillRect(o.x,o.y,o.w,o.h);
  }
}

// 🔁 loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
