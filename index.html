<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dino Game Melhorado</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    canvas {
      display: block;
      margin: auto;
      background: #87CEEB;
    }

    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="score">Pontos: 0</div>
<canvas id="game" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 👤 personagem (sua imagem)
let playerImg = new Image();
playerImg.src = "https://preview.redd.it/meme-man-original-hd-png-tranparent-3d-head-stonks-2922-3180-v0-jwg3gw87s6b41.png?width=1080&crop=smart&auto=webp&s=893b76d1beb8d0b676f427239f3f3c0f739165bb";

let player = {
  x: 50,
  y: 220,
  w: 45,
  h: 45,
  vy: 0,
  jumping: false
};

let gravity = 1;
let obstacles = [];
let score = 0;
let speed = 6;
let gameOver = false;

// 🌗 dia/noite
let skyDay = true;
setInterval(() => {
  skyDay = !skyDay;
}, 8000);

// ⌨️ pulo
document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && !player.jumping) {
    player.vy = -15;
    player.jumping = true;
  }
});

// 📦 obstáculos
function createObstacle() {
  obstacles.push({
    x: 800,
    y: 230,
    w: 20,
    h: 50
  });
}

setInterval(createObstacle, 1400);

// 🔄 update
function update() {
  if (gameOver) return;

  // aumenta dificuldade
  speed += 0.002;

  // player física
  player.vy += gravity;
  player.y += player.vy;

  if (player.y >= 220) {
    player.y = 220;
    player.jumping = false;
  }

  // obstáculos
  obstacles.forEach((obs, index) => {
    obs.x -= speed;

    // colisão
    if (
      player.x < obs.x + obs.w &&
      player.x + player.w > obs.x &&
      player.y < obs.y + obs.h &&
      player.y + player.h > obs.y
    ) {
      gameOver = true;
      alert("💀 Game Over! Pontos: " + score);
      location.reload();
    }

    // passou obstáculo
    if (obs.x + obs.w < 0) {
      obstacles.splice(index, 1);
      score++;
      document.getElementById("score").innerText = "Pontos: " + score;
    }
  });
}

// 🎨 desenhar
function draw() {
  // céu dia/noite
  ctx.fillStyle = skyDay ? "#87CEEB" : "#0b1d3a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // chão
  ctx.fillStyle = "#444";
  ctx.fillRect(0, 260, 800, 40);

  // personagem
  ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

  // obstáculos
  ctx.fillStyle = "red";
  obstacles.forEach(obs => {
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
  });
}

// 🔁 loop do jogo
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
